name: CI

on: [push, pull_request]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 18
      cache: "yarn"

  - name: Install deps
    run: yarn install --frozen-lockfile

  - name: Lint
    run: yarn lint

  - name: Test
    run: yarn test --if-present

  - name: Build
    run: yarn build
